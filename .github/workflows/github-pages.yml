name: Publish Test Sample

on:
  push:
    branches:
      - main
    paths:
      - samples/blazer-editor-test/**
      - wwwroot/**
      - .github/workflows/github-pages.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build static site artifact
        run: |
          set -e
          mkdir -p _site/wwwroot
          cp samples/blazer-editor-test/index.html _site/index.html
          cp wwwroot/blazer-markdown-editor.css _site/wwwroot/blazer-markdown-editor.css
          cp wwwroot/blazer-markdown-editor.js _site/wwwroot/blazer-markdown-editor.js
          cp wwwroot/blazer-markdown-editor.js.map _site/wwwroot/blazer-markdown-editor.js.map
          touch _site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
